spring:
  application:
    name: study-moim

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/study_moim?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax

logging:
  level:
    org.hibernate.SQL: debug
